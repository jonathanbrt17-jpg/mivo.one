<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIVO — Faire un don</title>
  <style>
    /* Fond noir avec étoiles */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }
    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      background: transparent;
      z-index: -1;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      animation: twinkle 2s infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    header {
      text-align: center;
      padding: 20px 0;
      background: #111;
    }
    header h1 { margin: 0; color: #00bfff; }
    header p { margin: 5px 0; color: #ccc; }

    main { text-align: center; padding: 50px 20px; }

    input[type="number"] {
      padding: 10px;
      width: 100px;
      font-size: 16px;
      border-radius: 5px;
      border: none;
      margin-right: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      background: #00bfff;
      color: #000;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    button:hover {
      background: #009acd;
    }

    .counter {
      margin-top: 30px;
      font-size: 18px;
      color: #ffdf00;
    }

    footer {
      text-align: center;
      padding: 15px 0;
      background: #111;
      color: #888;
      position: relative;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<header>
  <h1>MIVO</h1>
  <p>💙 Soutenez notre association — Chaque don compte !</p>
</header>

<main>
  <h2>Faites un don</h2>
  <p>Entrez le montant que vous souhaitez donner :</p>

  <input type="number" id="don" placeholder="€" min="1">
  <button onclick="donPayPal()">Faire un don</button>

  <div class="counter" id="counter">
    Objectif : <span id="objectif">999</span>€ | Atteint : <span id="atteint">0</span>€
  </div>
</main>

<footer>
  © 2025 - MIVO. Tous droits réservés.
</footer>

<script>
  // Fonction pour ouvrir PayPal avec montant libre
  function donPayPal(){
    const montant = document.getElementById('don').value;
    if(montant > 0){
      // Lien PayPal avec ton Hosted Button ID
      const url = `https://www.paypal.com/ncp/payment/YXRQ53KC9BPMN?amount=${montant}`;
      window.open(url, '_blank');

      // Mise à jour compteur (simple affichage local)
      let atteint = parseInt(document.getElementById('atteint').innerText);
      document.getElementById('atteint').innerText = atteint + parseInt(montant);
    } else {
      alert('Veuillez entrer un montant valide.');
    }
  }

  // Création aléatoire d'étoiles
  const starsContainer = document.getElementById('stars');
  for(let i=0; i<100; i++){
    let star = document.createElement('div');
    star.classList.add('star');
    let size = Math.random()*3+1;
    star.style.width = size+'px';
    star.style.height = size+'px';
    star.style.top = Math.random()*100+'%';
    star.style.left = Math.random()*100+'%';
    star.style.animationDuration = (Math.random()*3+1)+'s';
    starsContainer.appendChild(star);
  }
</script>

</body>
</html>
