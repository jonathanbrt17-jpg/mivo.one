<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIVO — Accès Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#000814,#001d3d);
  color:white;
  text-align:center;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
}

.back{
  background:#0077ff;
  padding:8px 15px;
  border-radius:10px;
  cursor:pointer;
  text-decoration:none;
  color:white;
  font-weight:600;
}

.clock{
  font-weight:600;
}

.container{
  margin-top:40px;
}

input, textarea{
  width:80%;
  max-width:600px;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  padding:12px 25px;
  margin:10px;
  border:none;
  border-radius:12px;
  background:#0077ff;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.hidden{
  display:none;
}

textarea{
  height:250px;
  font-family:'Great Vibes',cursive;
  font-size:22px;
}
</style>
</head>

<body>

<div class="topbar">
  <a href="index.html" class="back">⬅ Retour</a>
  <div class="clock" id="clock"></div>
</div>

<div id="login" class="container">
  <h2>🔐 Accès Protégé</h2>
  <input type="password" id="password" placeholder="Mot de passe">
  <br>
  <button onclick="checkPassword()">Entrer</button>
</div>

<div id="menu" class="container hidden">
  <h2>📂 Menu Pro</h2>
  <button onclick="openMail()">📧 Mail</button>
  <button onclick="openNotes()">📝 Notes</button>
</div>

<div id="mailSection" class="container hidden">
  <h2>📧 Envoyer un Mail</h2>
  <input type="email" id="toMail" placeholder="Mail du destinataire">
  <br>
  <input type="text" id="subjectMail" placeholder="Sujet">
  <br>
  <textarea id="messageMail" placeholder="Écris ton message ici..."></textarea>
  <br>
  <button onclick="sendMail()">Envoyer</button>
  <button onclick="backMenu()">🔙 Retour</button>
</div>

<div id="notesSection" class="container hidden">
  <h2>📝 Notes Personnelles</h2>
  <textarea id="notes" placeholder="Écris tes notes ici..."></textarea>
  <br>
  <button onclick="saveNotes()">💾 Sauvegarder</button>
  <button onclick="backMenu()">🔙 Retour</button>
</div>

  <div id="notesSection" class="container hidden">
  <h2>📝 Journal Intime </h2>
  <textarea id="notes" placeholder="Écris se que tu ressens ici Mivo t'écoute..."></textarea>
  <br>
  <button onclick="saveNotes()">💾 Sauvegarder</button>
  <button onclick="backMenu()">🔙 Retour</button>
</div>

<script>

// 🔐 MOT DE PASSE (tu peux le changer)
function checkPassword(){
  if(document.getElementById("password").value === "MIVO2026"){
    document.getElementById("login").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
  } else {
    alert("Mot de passe incorrect");
  }
}

// 📧 MAIL (ouvre application mail)
function sendMail(){
  let to = document.getElementById("toMail").value;
  let subject = document.getElementById("subjectMail").value;
  let message = document.getElementById("messageMail").value;

  window.location.href = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
}

// 📝 NOTES sauvegarde locale
function saveNotes(){
  localStorage.setItem("mivoNotes", document.getElementById("notes").value);
  alert("Notes sauvegardées !");
}

window.onload = function(){
  document.getElementById("notes").value = localStorage.getItem("mivoNotes") || "";
}

// 📂 Navigation
function openMail(){
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("mailSection").classList.remove("hidden");
}

function openNotes(){
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("notesSection").classList.remove("hidden");
}

function backMenu(){
  document.getElementById("mailSection").classList.add("hidden");
  document.getElementById("notesSection").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}

// 🕒 Heure Paris
function updateClock(){
  const now = new Date().toLocaleString("fr-FR", { timeZone: "Europe/Paris" });
  document.getElementById("clock").textContent = "Heure Paris : " + now;
}
setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
