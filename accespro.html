<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIVO — Accès Pro</title>

<style>
body{
  background:#000814;
  color:white;
  font-family:Arial, sans-serif;
  margin:0;
  padding:20px;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.back-btn{
  background:#00c6ff;
  border:none;
  padding:8px 15px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.clock{
  font-weight:bold;
  color:#00c6ff;
}

.container{
  max-width:800px;
  margin:40px auto;
}

label{
  display:block;
  margin-top:20px;
  font-weight:bold;
  color:#00c6ff;
}

input, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:8px;
  font-size:16px;
}

textarea{
  height:250px;
  resize:none;
}

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="top-bar">
  <button class="back-btn" onclick="window.location.href='index.html'">⬅ Retour</button>
  <div class="clock" id="clock"></div>
</div>

<div class="container" id="loginBox">
  <h2>🔐 Accès Pro</h2>
  <p>Entrez le code :</p>
  <input type="password" id="codeInput">
  <button onclick="checkCode()">Entrer</button>
</div>

<div class="container hidden" id="editorBox">

  <h2>📧 Envoi de message</h2>

  <!-- TON MAIL FIXE -->
  <label>📨 Mail expéditeur (MIVO)</label>
  <input type="text" value="mivoasso@proto.me" disabled>

  <!-- MAIL DESTINATAIRE -->
  <label>👤 Mail du destinataire</label>
  <input type="email" id="recipientEmail" placeholder="exemple@gmail.com">

  <!-- MESSAGE -->
  <label>📝 Ton message</label>
  <textarea id="messageArea" placeholder="Écris ton message ici..."></textarea>

  <button onclick="sendEmail()">Envoyer le mail</button>

</div>

<script>
const SECRET_CODE = "MIVO2025";

function checkCode(){
  const input = document.getElementById("codeInput").value;
  if(input === SECRET_CODE){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("editorBox").classList.remove("hidden");
  } else {
    alert("Code incorrect");
  }
}

function sendEmail(){
  const recipient = document.getElementById("recipientEmail").value;
  const message = document.getElementById("messageArea").value;

  if(!recipient || !message){
    alert("Remplis tous les champs !");
    return;
  }

  const subject = "Message officiel MIVO";
  const body = "Expéditeur : mivoasso@proto.me\n\n" + message;

  const mailtoLink = `mailto:${recipient}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailtoLink;
}

/* Heure Paris */
function updateClock(){
  const options = {
    timeZone: "Europe/Paris",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  };
  const now = new Date().toLocaleTimeString("fr-FR", options);
  document.getElementById("clock").textContent = "Paris : " + now;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
